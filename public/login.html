<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Samir Ali</title>

    <!-- Scripts & Styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
        // Apply theme early on load
        if (localStorage.getItem('portfolio-theme') === 'dark') {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        theme: {
                            primary: '#38BDF8',
                            glow: 'rgba(56, 189, 248, 0.3)',
                            textPrimary: 'var(--theme-text-primary)',
                            textSecondary: 'var(--theme-text-secondary)',
                            bgStart: 'var(--theme-bg-start)',
                            bgMid: 'var(--theme-bg-mid)',
                            bgEnd: 'var(--theme-bg-end)',
                        }
                    },
                    fontFamily: {
                        jakarta: ['"Plus Jakarta Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- External Resources -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body class="antialiased font-jakarta overflow-hidden min-h-screen flex items-center justify-center p-4">

    <!-- Navbar Logo only -->
    <nav class="fixed top-0 left-0 w-full z-50 py-8 px-4 lg:px-12 pointer-events-none">
        <div class="max-w-7xl mx-auto flex items-center justify-between pointer-events-auto">
            <a href="index.html" class="flex items-center space-x-2 group">
                <div
                    class="w-10 h-10 bg-gradient-primary rounded-lg flex items-center justify-center font-bold text-white text-xl text-center">
                    S</div>
                <span
                    class="text-xl font-bold tracking-tight text-theme-textPrimary group-hover:text-theme-primary transition-colors">Samir.</span>
            </a>
        </div>
    </nav>

    <!-- Animated Background Mesh -->
    <div class="fixed inset-0 z-0">
        <div
            class="absolute top-1/4 left-1/4 w-[400px] h-[400px] bg-theme-primary/10 rounded-full blur-[120px] animate-pulse">
        </div>
        <div class="absolute bottom-1/4 right-1/4 w-[400px] h-[400px] bg-indigo-500/10 rounded-full blur-[120px] animate-pulse"
            style="animation-delay: 1s;"></div>
    </div>

    <!-- Login Card -->
    <main class="relative z-10 w-full max-w-md" data-aos="zoom-in" data-aos-duration="1000">
        <div
            class="glass-login p-10 rounded-[2.5rem] text-center border border-white/10 shadow-2xl backdrop-blur-3xl overflow-hidden relative group">
            <!-- Loading Overlay -->
            <div id="loading-overlay"
                class="absolute inset-0 bg-black/60 backdrop-blur-md z-30 flex flex-center items-center justify-center translate-y-full transition-transform duration-500">
                <div class="flex flex-col items-center">
                    <div class="loading-spinner mb-4"></div>
                    <p class="text-xs font-black uppercase tracking-widest text-theme-primary">Authenticating...</p>
                </div>
            </div>

            <!-- Header -->
            <div class="mb-8">
                <div id="admin-shield"
                    class="inline-flex items-center justify-center w-16 h-16 rounded-3xl bg-theme-primary/10 mb-6 group-hover:scale-110 transition-transform duration-500 cursor-pointer">
                    <i data-lucide="shield-check" class="w-8 h-8 text-theme-primary"></i>
                </div>
                <h1 class="text-3xl font-black text-theme-textPrimary mb-2">Admin Access</h1>
                <p class="text-theme-textSecondary text-sm opacity-60">Reserved for Super Admin only. Please
                    authenticate to dashboard.</p>
            </div>

            <!-- Error Box -->
            <div id="error-box"
                class="hidden mb-6 p-4 rounded-2xl bg-red-500/10 border border-red-500/20 text-red-500 text-xs font-bold flex items-center gap-3 animate-shake">
                <i data-lucide="alert-circle" class="w-4 h-4"></i>
                <span id="error-message">Access Denied: Unauthorized Admin</span>
            </div>

            <!-- Google Login Container -->
            <div class="space-y-4">
                <div id="g_id_onload"
                    data-client_id="757460099776-jmbea2p3j2upunqgnr6oo2jigt0vo0ch.apps.googleusercontent.com"
                    data-context="signin" data-ux_mode="popup" data-callback="handleCredentialResponse"
                    data-auto_prompt="false">
                </div>

                <div class="g_id_signin flex justify-center w-full" data-type="standard" data-shape="pill"
                    data-theme="filled_black" data-text="continue_with" data-size="large" data-logo_alignment="left"
                    data-width="320">
                </div>
            </div>

            <div class="mt-8 pt-6 border-t border-white/5">
                <a href="index.html"
                    class="text-[10px] font-black uppercase tracking-widest text-theme-textSecondary hover:text-theme-primary transition-colors flex items-center justify-center gap-2">
                    <i data-lucide="arrow-left" class="w-3 h-3"></i> Back to Hub
                </a>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true });
        lucide.createIcons();
    </script>
    <script src="js/login.js"></script>
</body>

</html>
